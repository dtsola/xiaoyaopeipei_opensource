# ==================== 小遥配配 - Nginx 站点配置 (HTTP) ====================
# 适用于开发/测试环境，生产环境请使用 https.conf

server {
    listen 80;
    server_name _;

    # 访问日志
    access_log /var/log/nginx/xiaoyaopeipei-access.log;
    error_log /var/log/nginx/xiaoyaopeipei-error.log;

    # ==================== C端前端 ====================
    location / {
        proxy_pass http://user-frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==================== B端前端 ====================
    location /mer {
        proxy_pass http://mer-frontend:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==================== 后端 API - C端接口 ====================
    location /api/user/ {
        proxy_pass http://backend:8001/api/user/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # ==================== 后端 API - B端接口 ====================
    location /api/mer/ {
        proxy_pass http://backend:8001/api/mer/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
}
